<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
  <script>
  (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})();
</script>
</head>
<body>
  <div class="app-container">
    <!-- Header with title and dark mode toggle -->
    <header class="app-header">
      <h1>Task Manager</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <!-- Sun SVG (shown in dark mode) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon SVG (shown in light mode) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <main>
      <!-- Task creation form -->
      <form class="task-form" id="task-form">
        <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="255" required autocomplete="off">
        <button type="submit"><span class="btn-text">Add</span><span class="btn-spinner hidden"></span></button>
      </form>

      <!-- Search bar -->
      <div class="search-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search tasks...">
        <button class="search-clear hidden" id="search-clear" type="button" aria-label="Clear search">&times;</button>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs" role="tablist" aria-label="Task filters">
        <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true" tabindex="0">All <span class="filter-count" id="count-all">0</span></button>
        <button class="filter-tab" data-filter="active" role="tab" aria-selected="false" tabindex="-1">Active <span class="filter-count" id="count-active">0</span></button>
        <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false" tabindex="-1">Completed <span class="filter-count" id="count-completed">0</span></button>
      </div>

      <!-- Loading spinner (hidden by default) -->
      <div class="spinner" id="spinner">
        <div></div>
      </div>

      <!-- Task list -->
      <ul class="task-list hidden" id="task-list"></ul>

      <!-- Empty state (hidden by default) -->
      <div class="empty-state hidden" id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
          <rect x="40" y="40" width="120" height="140" rx="12" stroke="currentColor" stroke-width="4" opacity="0.3"/>
          <line x1="65" y1="80" x2="135" y2="80" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
          <line x1="65" y1="100" x2="120" y2="100" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
          <line x1="65" y1="120" x2="105" y2="120" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
          <circle cx="145" cy="145" r="35" fill="var(--color-accent, #5b8bf7)" opacity="0.15"/>
          <path d="M135 145 L143 153 L157 137" stroke="var(--color-accent, #5b8bf7)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        </svg>
        <p class="empty-state-title" id="empty-state-title">No tasks yet</p>
        <p class="empty-state-hint" id="empty-state-hint">Add your first task above to get started</p>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
